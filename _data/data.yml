    intro: >


    assignments:
      - title: RAISR Python
        link: "https://www.github.com/movehand/raisr"
        tagline: "Implemented Google’s RAISR: Rapid and Accurate Image Super-Resolution with Python.
        Utilized the concept of hash bucketing and machine learning to
        enhance the resolution of low quality images.
        The most recognized project among all unofficial implementations,
        gets over 300 stars and 90 forks on Github.
        Utilized Python, OpenCV, and Git."

      - title: Allbento
        link: "assets/images/allbento.png"
        tagline: "Designed and implemented a full-stack web service
        that served as a meal-ordering information collector for groups.
        Used React and Redux as the frontend framework for ordering page,
        menu creating page and displaying organized results after meal-ordering.
        Styled with Bootstrap. Developed backend API server using Sails.js and
        implemented the user authentication feature using Passport.js.
        Utilized Webpack for hot reloading at developing stage and as the
        bundling tool to generate the production code.
        Deployed the web and API servers on AWS and configuring them with Nginx."

      - title: Hoscaper - A Horror Hospital Escape Game
        link: "https://www.youtube.com/watch?v=RhFGuW9MAYI"
        tagline: "Developed a VR horror game using Unity3D,
        where users can take commands using their own voice."

      - title: Eaterate
        link: "assets/pdf/nmlab_report.pdf"
        tagline: "Created a social networking Android App that groups strangers into a single meal.
        Implemented chatroom, nearby users and sharing posts by Java and Android Canvas.
        Utilized Facebook and Google API to enable login and GPS features."

      - title: TeddyCam
        link: "assets/pdf/TeddyCamReport.pdf"
        tagline: "Detected human in-air sketching with webcam and generates the corresponding polygon.
        Implemented the algorithm that can transformed a single
        polygon into a 3D mesh model within 3 seconds."

      - title: Mini RPG
        link: "assets/pdf/oop_report.pdf"
        tagline: "Developed a complete game framework featuring NPCs with storyline,
        dialogs, fighting scene and item system.
        Implemented a backend database to store maps and NPCs to avoid recompilation
        when modifying the game."

      - title: Stereoscopic 3D Image by Single Image
        link: "assets/pdf/DIP_FinalReport.pdf"
        tagline: "Developed algorithms of color segmentation,
        semantic region detection and vanishing point detection to construct
        a 3D image from a single plain image."

